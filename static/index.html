<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#3B5BDB" />
  <meta name="description" content="轻量级赛事获奖排名工具，免注册开箱即用，数据本地存储" />
  <title>赛事排名工具</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <!-- 顶部导航 -->
  <header class="app-header">
    <div class="header-inner">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <div class="brand-text">
          <h1 class="brand-title">赛事排名</h1>
          <p class="brand-sub">获奖评定 · 本地存储</p>
        </div>
      </div>
      <button id="newRankBtn" class="btn btn-ghost-danger" type="button" aria-label="新建排名，将清空当前数据">
        新建排名
      </button>
    </div>
    <!-- 标签栏 -->
    <nav class="tabs" role="tablist" aria-label="功能模块">
      <button class="tab active" data-tab="awards" role="tab" aria-selected="true">奖项配置</button>
      <button class="tab" data-tab="players" role="tab" aria-selected="false">成绩录入</button>
      <button class="tab" data-tab="result" role="tab" aria-selected="false">排名结果</button>
    </nav>
  </header>

  <main class="app-main">
    <!-- ============ 奖项配置 ============ -->
    <section id="tab-awards" class="tab-panel active" role="tabpanel">
      <div class="panel-head">
        <div>
          <h2 class="panel-title">奖项配置</h2>
          <p class="panel-tip">拖拽调整级别高低，越靠前级别越高</p>
        </div>
        <span id="awardCount" class="count-badge">0 项</span>
      </div>

      <ul id="awardList" class="award-list" aria-label="奖项列表，可拖拽排序"></ul>

      <div id="awardEmpty" class="empty-state hidden">
        <div class="empty-icon" aria-hidden="true">奖</div>
        <p class="empty-text">还没有奖项，点击下方添加</p>
      </div>

      <button id="addAwardBtn" class="btn btn-dashed" type="button">
        <span class="plus" aria-hidden="true">+</span> 新增奖项
      </button>

      <div class="panel-foot">
        <button id="gotoPlayersBtn" class="btn btn-primary btn-block" type="button">
          下一步 · 录入成绩
        </button>
      </div>
    </section>

    <!-- ============ 成绩录入 ============ -->
    <section id="tab-players" class="tab-panel" role="tabpanel">
      <div class="panel-head">
        <div>
          <h2 class="panel-title">成绩录入</h2>
          <p class="panel-tip">回车快捷提交，支持随时编辑删除</p>
        </div>
        <span id="playerCount" class="count-badge">0 人</span>
      </div>

      <form id="playerForm" class="player-form" autocomplete="off" novalidate>
        <div class="form-row">
          <div class="field">
            <label class="field-label" for="playerName">姓名</label>
            <input id="playerName" class="input" type="text" name="name"
                   placeholder="选手姓名" maxlength="30" enterkeyhint="next" />
          </div>
          <div class="field field-score">
            <label class="field-label" for="playerScore">分数</label>
            <input id="playerScore" class="input" type="text" name="score"
                   placeholder="0" inputmode="decimal" maxlength="10" enterkeyhint="done" />
          </div>
        </div>
        <button id="addPlayerBtn" class="btn btn-primary btn-block" type="submit">
          添加选手
        </button>
      </form>

      <ul id="playerList" class="player-list" aria-label="选手列表"></ul>

      <div id="playerEmpty" class="empty-state hidden">
        <div class="empty-icon" aria-hidden="true">人</div>
        <p class="empty-text">还没有选手，填写上方表单添加</p>
      </div>

      <div class="panel-foot">
        <button id="generateBtn" class="btn btn-primary btn-block" type="button">
          生成排名结果
        </button>
      </div>
    </section>

    <!-- ============ 排名结果 ============ -->
    <section id="tab-result" class="tab-panel" role="tabpanel">
      <div class="panel-head">
        <div>
          <h2 class="panel-title">排名结果</h2>
          <p class="panel-tip">长按榜单可复制文本</p>
        </div>
      </div>

      <div id="resultSummary" class="summary-grid"></div>

      <div class="sort-bar">
        <span class="sort-label">排序：</span>
        <div class="sort-group" role="group" aria-label="榜单排序方式">
          <button class="sort-btn active" data-sort="rank" type="button">名次</button>
          <button class="sort-btn" data-sort="score" type="button">分数</button>
          <button class="sort-btn" data-sort="name" type="button">姓名</button>
        </div>
      </div>

      <ol id="rankList" class="rank-list" aria-label="排名榜单"></ol>

      <div id="resultEmpty" class="empty-state">
        <div class="empty-icon" aria-hidden="true">榜</div>
        <p class="empty-text">尚未生成排名，请先完成奖项与成绩配置</p>
        <button id="gotoPlayersFromResult" class="btn btn-soft btn-block" type="button">
          去录入成绩
        </button>
      </div>
    </section>
  </main>

  <!-- 二次确认弹窗 -->
  <div id="modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-mask"></div>
    <div class="modal-box">
      <h3 id="modalTitle" class="modal-title">确认操作</h3>
      <p id="modalText" class="modal-text">该操作不可撤销，请确认</p>
      <div class="modal-actions">
        <button id="modalCancel" class="btn btn-soft" type="button">取消</button>
        <button id="modalConfirm" class="btn btn-danger" type="button">确认</button>
      </div>
    </div>
  </div>

  <!-- Toast 容器 -->
  <div id="toastContainer" class="toast-container" aria-live="polite" aria-atomic="false"></div>

  <!-- 模块脚本（按依赖顺序加载） -->
  <script src="/static/js/toast.js"></script>
  <script src="/static/js/store.js"></script>
  <script src="/static/js/ranking.js"></script>
  <script src="/static/js/drag.js"></script>
  <script src="/static/js/render.js"></script>
  <script src="/static/js/app.js"></script>
</body>
</html>
